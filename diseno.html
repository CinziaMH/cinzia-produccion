<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cinzia — Diseño</title>
<style>
:root{--nar:#EA580C;--naro:#c2410c;--bg:#f4f4f5;--card:#fff;--line:#e4e4e7;--txt:#1f2937;--muted:#71717a;--green:#16a34a;--amber:#d97706;--red:#dc2626;--navy:#0f172a}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;display:flex;flex-direction:column;align-items:center}
.hero{background:var(--nar);color:#fff;width:100%;padding:34px 20px 26px;text-align:center}
.hero h1{font-size:26px;font-weight:800;letter-spacing:.5px}
.hero h1 .a{color:#ffd9c2}
.hero p{font-size:14px;opacity:.92;margin-top:4px}
.wrap{width:100%;max-width:1500px;padding:20px 24px;display:flex;flex-direction:column;gap:14px}
.summary{max-width:720px}
.sect{font-size:12px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin:8px 2px -2px}
.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.sc{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 8px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.sc .b{font-size:22px;font-weight:800;line-height:1}
.sc .l{font-size:10.5px;color:var(--muted);margin-top:4px;line-height:1.2}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.chead{display:flex;align-items:center;gap:12px}
.av{width:46px;height:46px;border-radius:12px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:18px;overflow:hidden}
.av img,.ic img{width:100%;height:100%;object-fit:cover;border-radius:inherit;display:block}
.chead .nm{font-weight:800;font-size:17px}
.chead .pj{font-size:12px;color:var(--muted);margin-top:1px}
.pctwrap{margin-left:auto;text-align:right}
.pctwrap .p{font-size:22px;font-weight:800;line-height:1}
.pctwrap .pl{font-size:10.5px;color:var(--muted)}
.bar{height:9px;border-radius:99px;background:#eef0f2;overflow:hidden;margin:12px 0 4px;display:flex}
.bar i{display:block;height:100%;background:var(--green)}
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;text-align:center}
.st{cursor:pointer;border-radius:9px;padding:6px 2px;border:1px solid transparent;transition:.08s}
.st:hover{background:#f6f6f7}
.st.active{border-color:var(--nar);background:#fff7f2}
.st .n{font-size:16px;font-weight:800;line-height:1}
.st .k{font-size:10px;color:var(--muted);margin-top:3px}
.st.warn .n{color:var(--amber)} .st.bad .n{color:var(--red)} .st.ok .n{color:var(--green)}
.foco{font-size:12.5px;color:#7a3316;background:#fdece4;border-radius:10px;padding:9px 11px;margin-top:12px;line-height:1.4}
.foco b{color:var(--nar)}
/* detalle proceso / pendiente */
.detail{margin-top:12px;border-top:1px solid var(--line);padding-top:11px;max-height:430px;overflow:auto}
.dh{font-size:11px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);margin-bottom:7px;display:flex;align-items:center;gap:6px}
.trow{display:flex;align-items:center;gap:9px;padding:7px 9px;border:1px solid var(--line);border-radius:9px;margin-bottom:6px;text-decoration:none;color:var(--txt)}
.trow:active{background:#fafafa}
.trow .tn{font-size:12.5px;line-height:1.3;flex:1;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.age{font-size:11px;font-weight:800;padding:2px 8px;border-radius:99px;white-space:nowrap;background:#eef2f6;color:var(--navy)}
.age.warm{background:#fdf0dd;color:var(--amber)} .age.hot{background:#fde8e8;color:var(--red)}
details.pend{margin-top:4px}
details.pend summary{cursor:pointer;font-size:11px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);padding:6px 0}
.cardlink{display:inline-flex;align-items:center;gap:6px;margin-top:12px;font-size:13px;font-weight:700;color:var(--nar);text-decoration:none}
.btn{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px 18px;text-decoration:none;color:var(--txt);box-shadow:0 1px 3px rgba(0,0,0,.06);transition:transform .1s}
.btn:active{transform:scale(.98)}
.btn .ic{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex:0 0 auto;color:#fff;font-weight:800;overflow:hidden}
.btn .tt{font-weight:800;font-size:16px}
.btn .ss{font-size:12.5px;color:var(--muted);margin-top:2px}
.flag{font-size:11px;font-weight:800;padding:2px 8px;border-radius:99px;background:#fdece4;color:var(--nar);margin-left:auto}
.foot{margin-top:auto;padding:18px;font-size:12px;color:var(--muted);text-align:center;line-height:1.5}
a.up{color:var(--muted);text-decoration:none}
</style>
</head>

var PROC_DONE = {5359:12,5462:12,5464:12,5816:20,5815:25,5818:20,5813:0,5812:20,5215:8,5216:45,5237:7,5251:6,5301:7,5302:7,5311:68,5317:8,5318:2,5319:2,5320:56,5321:17,5324:24,5336:7,5345:40,5426:25,5427:43,5449:19,5450:19,5451:10,5488:17,5489:4,5490:13,5491:10,5508:1,5538:15,5574:14,5575:13,5576:23,5577:62,5653:3,5654:18,5684:10,5697:19,5710:7,5711:44,5724:7,5725:7,5726:0};
var TODAY = new Date(SNAPSHOT_DATE+"T12:00:00");
function bucket(s){s=s.toLowerCase();if(s.indexOf("listo")>=0)return"done";if(s.indexOf("proceso")>=0)return"proc";return"todo";}
function days(a,b){return Math.round((a-b)/86400000);}
function age(t){ return t.d? days(TODAY,new Date(t.d+"T12:00:00")) : 0; }
function ageCls(b,d){ if(b==="done")return""; if(b==="proc"){return d>=21?"hot":(d>=10?"warm":"");} return d>=45?"hot":(d>=30?"warm":""); }
function fmd(s){ if(!s) return ""; var p=s.split('-'); return p[2]+'/'+p[1]; }

// Pesos de severidad por tarea ABIERTA (ajustables). Restan al score de Salud (100 = ideal).
var W = { venc:10, sinmov:6, procViejo:6, proc:2, cola:3 };
// severidad de una tarea (0 si está cerrada)
function sev(t){
  var b=bucket(t.s), a=age(t);
  if(b==="done") return 0;
  if(t.dl && new Date(t.dl+"T12:00:00")<TODAY) return W.venc;   // vencida
  if(a>30) return W.sinmov;                                     // sin movimiento +30d (incluye cola vieja)
  if(b==="proc" && a>21) return W.procViejo;                    // proceso envejecido
  if(b==="proc") return W.proc;                                 // en proceso al día
  return W.cola;                                                // en cola / espera (aunque no tenga fecha)
}
function saludColor(s){ return s>=70?"var(--green)":(s>=40?"var(--amber)":"var(--red)"); }

function metrics(d){
  var m={total:d.t.length,done:0,proc:0,todo:0,over:0,stale:0,recent:0,procDays:[],load:0,risk:0};
  d.t.forEach(function(t){
    var b=bucket(t.s), a=age(t);
    if(b==="done"){m.done++; if(a<=30)m.recent++;}
    else if(b==="proc"){m.proc++; m.procDays.push(a);}
    else {m.todo++;}
    if(b!=="done"){
      if(t.dl && new Date(t.dl+"T12:00:00")<TODAY) m.over++;
      if(a>30) m.stale++;
    }
    var s=sev(t); m.load+=s; if(s>=W.sinmov) m.risk++;
  });
  m.open = m.proc+m.todo;
  m.salud = Math.max(0, Math.min(100, 100-m.load));
  m.pct = m.total? Math.round(m.done/m.total*100):0;
  m.procMax = m.procDays.length? Math.max.apply(null,m.procDays):0;
  m.procAvg = m.procDays.length? Math.round(m.procDays.reduce(function(x,y){return x+y;},0)/m.procDays.length):0;
  return m;
}

function sc(b,l,c){return '<div class="sc"><div class="b" style="color:'+c+'">'+b+'</div><div class="l">'+l+'</div></div>';}
function renderSummary(){
  var T={total:0,proc:0,todo:0,risk:0};
  DES.forEach(function(d){var m=metrics(d);T.total+=m.total;T.proc+=m.proc;T.todo+=m.todo;T.risk+=m.risk;});
  document.getElementById('summary').innerHTML=
    sc(T.total,"Tareas activas","var(--navy)")+
    sc(T.proc,"En proceso","#2563EB")+
    sc(T.todo,"En cola","var(--navy)")+
    sc(T.risk,"En riesgo",T.risk?"var(--red)":"var(--navy)");
}

function trow(t){
  var b=bucket(t.s), a=age(t);
  if(b==="done"){
    var pr=PROC_DONE[t.i];
    var lbl=(pr!=null)?('🔧 '+pr+' d en proceso'):'proceso s/d';
    var cls=(pr==null)?'':(pr>=21?'hot':(pr>=10?'warm':''));
    return '<a class="trow" target="_blank" href="'+ODOO_TASK+t.i+'">'+
      '<span class="tn">'+t.n+'</span>'+
      '<span class="age" style="background:#eef4ff;color:#2563EB">✓ '+fmd(t.d)+'</span>'+
      '<span class="age '+cls+'">'+lbl+'</span></a>';
  }
  var word = b==="proc"?"en proceso":"esperando";
  return '<a class="trow" target="_blank" href="'+ODOO_TASK+t.i+'">'+
    '<span class="tn">'+t.n+'</span>'+
    '<span class="age '+ageCls(b,a)+'">'+a+' d '+word+'</span></a>';
}
var LABELS={done:'Listo',proc:'En proceso',todo:'Por hacer',over:'Vencidas',stale:'Sin movimiento'};
function tasksFor(d,type){
  var arr = d.t.filter(function(t){
    var b=bucket(t.s), a=age(t);
    if(type==='done') return b==='done';
    if(type==='proc') return b==='proc';
    if(type==='todo') return b==='todo';
    if(type==='over') return b!=='done' && t.dl && new Date(t.dl+"T12:00:00")<TODAY;
    if(type==='stale') return b!=='done' && a>30;
    return false;
  });
  if(type==='done') arr.sort(function(a,b){ return new Date(b.d)-new Date(a.d); }); // cerradas: más recientes arriba
  else arr.sort(function(a,b){ return age(b)-age(a); });                            // abiertas: más viejas arriba
  return arr;
}
function renderDetail(key,type){
  var d=DES.filter(function(x){return x.key===key;})[0]; if(!d) return;
  var list=tasksFor(d,type), m=metrics(d);
  var head = (type==='proc')
    ? '<div class="dh">🔧 En proceso ('+list.length+') · prom. '+m.procAvg+' d · más viejo '+m.procMax+' d</div>'
    : '<div class="dh">'+LABELS[type]+' ('+list.length+')</div>';
  var box=document.getElementById('detail-'+key);
  box.innerHTML = head + (list.length? list.map(trow).join('') : '<div style="color:var(--muted);font-size:12px">Sin tareas en este estado.</div>');
  var card=box.closest('.card');
  card.querySelectorAll('.st').forEach(function(s){ s.classList.toggle('active', s.dataset.type===type); });
}
window.filterCard=function(key,type){ renderDetail(key,type); };

function renderCards(){
  document.getElementById('cards').innerHTML = DES.map(function(d){
    var m=metrics(d);
    var st=[
      ['ok',m.done,'Listo','done'],['',m.proc,'Proceso','proc'],['',m.todo,'Por hacer','todo'],
      [m.over?'bad':'',m.over,'Vencidas','over'],[m.stale?'warn':'',m.stale,'Sin mov.','stale']
    ].map(function(s){return '<div class="st '+s[0]+'" data-type="'+s[3]+'" onclick="filterCard(\''+d.key+'\',\''+s[3]+'\')"><div class="n">'+s[1]+'</div><div class="k">'+s[2]+'</div></div>';}).join('');
    var recent = m.recent? m.recent+' cerradas en 30 días' : 'sin cierres recientes';
    return '<div class="card">'+
      '<div class="chead">'+avatar(d,'av')+
        '<div><div class="nm">'+d.name+'</div><div class="pj">'+d.proj+' · '+m.total+' tareas · '+recent+'</div></div>'+
        '<div class="pctwrap"><div class="p" style="color:'+saludColor(m.salud)+'">'+m.salud+'%</div><div class="pl">salud</div></div></div>'+
      '<div class="bar">'+
        '<i style="width:'+(m.total?m.done/m.total*100:0)+'%;background:var(--green)"></i>'+
        '<i style="width:'+(m.total?m.proc/m.total*100:0)+'%;background:#2563EB"></i>'+
        '<i style="width:'+(m.total?m.todo/m.total*100:0)+'%;background:#cbd5e1"></i>'+
      '</div>'+
      '<div style="display:flex;justify-content:space-between;font-size:10.5px;color:var(--muted);margin:2px 0 8px">'+
        '<span><b style="color:var(--green)">'+m.done+'</b> listo · <b style="color:#2563EB">'+m.proc+'</b> proceso · <b>'+m.todo+'</b> en cola</span>'+
        '<span>'+(m.risk?'<b style="color:var(--red)">'+m.risk+' en riesgo</b>':'sin riesgo')+' · '+m.pct+'% compl.</span>'+
      '</div>'+
      '<div class="stats">'+st+'</div>'+
      '<div class="foco"><b>Foco:</b> '+d.foco+'</div>'+
      '<div class="detail" id="detail-'+d.key+'"></div>'+
      '<a class="cardlink" target="_blank" href="'+ODOO_KANBAN+d.projId+'">Abrir tablero completo en Odoo →</a>'+
    '</div>';
  }).join('');
  DES.forEach(function(d){ renderDetail(d.key,'proc'); });
}

function renderBoards(){
  document.getElementById('boards').innerHTML = DES.map(function(d){
    var m=metrics(d);
    var flag = d.key==="matias" ? '<span class="flag">cargar planning</span>' :
               '<span class="flag" style="background:'+(m.salud>=70?'#e6f4ec':m.salud>=40?'#fdf0dd':'#fde8e8')+';color:'+saludColor(m.salud)+'">salud '+m.salud+'%</span>';
    return '<a class="btn" target="_blank" href="'+ODOO_KANBAN+d.projId+'">'+
      avatar(d,'ic')+
      '<div><div class="tt">Tablero de '+d.name+'</div><div class="ss">Proyecto Odoo · '+m.total+' tareas · '+m.proc+' en proceso · '+m.todo+' en cola · '+m.risk+' en riesgo</div></div>'+flag+'</a>';
  }).join('');
}

function fdate(s){var p=s.split('-');return p[2]+'/'+p[1]+'/'+p[0];}
document.getElementById('foot').innerHTML =
  'Salud = 100 − penalización por tareas abiertas (vencida 10 · sin movimiento 6 · proceso viejo 6 · en cola 3 · en proceso 2). Verde ≥70, ámbar 40-69, rojo &lt;40.<br>Tiempo en abiertas = días en la etapa actual. En cerradas = días reales en Proceso (historial de etapas de Odoo); "s/d" = sin registro.<br>Snapshot: '+fdate(SNAPSHOT_DATE)+' · Alex (150), Sabrina (152), Matías (154) · <a class="up" href="index.html">← Volver a Producción</a>';

var _lu=document.getElementById('lastUpd'); if(_lu) _lu.textContent=fdate(SNAPSHOT_DATE)+' · '+SNAPSHOT_TIME+' hs';
renderSummary(); renderCards(); renderBoards();
</script>
</body>
</html>
