<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cinzia · Pie de Línea (celular)</title>
<style>
:root{--nar:#EA580C;--ok:#16a34a;--warn:#ca8a04;--bad:#dc2626;--bg:#f4f4f5;--card:#fff;--line:#e4e4e7;--txt:#1f2937;--muted:#71717a}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--txt);font-size:15px;padding-bottom:40px}
.hdr{background:var(--nar);color:#fff;padding:14px;position:sticky;top:0;z-index:10;display:flex;justify-content:space-between;align-items:center}
.hdr h1{font-size:17px;font-weight:800}
.hdr .sub{font-size:11px;opacity:.9}
.hdr button{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.45);color:#fff;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700}
.alert{background:var(--bad);color:#fff;padding:8px 14px;font-weight:700;font-size:13px;display:none}
.wrap{padding:12px;max-width:560px;margin:0 auto}
.kpis{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px}
.kpi .k{font-size:10px;font-weight:800;color:var(--muted);letter-spacing:.5px}
.kpi .v{font-size:26px;font-weight:800}
.kpi .s{font-size:11px;color:var(--muted)}
.kpi.bad{background:#fef2f2;border-color:#fecaca}.kpi.bad .v{color:var(--bad)}
.kpi.good .v{color:var(--ok)}.kpi.warn .v{color:var(--warn)}
.sec{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:10px}
.sec h3{font-size:12px;font-weight:800;color:var(--muted);letter-spacing:.5px;margin-bottom:8px}
.monhead{display:flex;align-items:center;gap:8px;margin:14px 0 8px}
.pill{color:#fff;font-weight:800;font-size:13px;padding:3px 12px;border-radius:9px}
.monname{font-weight:800;font-size:15px}
.moncnt{font-size:12px;color:var(--muted);margin-left:auto}
.mo{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:10px 12px;margin-bottom:8px}
.mo .l1{display:flex;align-items:center;gap:8px}
.mo .num{font-weight:800;font-size:16px}
.mo .meta{color:var(--muted);font-size:12px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.st{font-size:10px;font-weight:800;padding:2px 9px;border-radius:99px}
.st-RITMO{background:#dcfce7;color:#166534}.st-RIESGO{background:#fef9c3;color:#854d0e}.st-OK{background:#f4f4f5;color:#52525b}.st-SINACT{background:#e4e4e7;color:#71717a}
.mo .l2{font-size:12px;color:var(--muted);margin-top:4px}
.dias{font-weight:800;color:var(--nar)}
.dias.alert2{color:var(--bad)}
.sigue{font-size:12px;color:var(--nar);font-weight:700;margin:-2px 0 8px}
.li{display:flex;justify-content:space-between;font-size:13px;padding:4px 0;border-bottom:1px solid var(--line)}
.spin{width:34px;height:34px;border:4px solid var(--line);border-top-color:var(--nar);border-radius:50%;animation:r 1s linear infinite;margin:40px auto}
@keyframes r{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="hdr">
  <span style="background:#fff;border-radius:10px;padding:5px 10px;display:inline-flex;align-items:center"><img src="cinzia%20logo.png" onerror="this.parentNode.style.display='none'" alt="CINZIA" style="height:26px;display:block"></span>
  <div style="flex:1;margin-left:10px"><h1>Pie de Línea</h1><div class="sub" id="gen">cargando…</div></div>
  <a href="./" style="background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.45);color:#fff;border-radius:8px;padding:6px 10px;font-size:14px;text-decoration:none;margin-right:8px">🏠</a>
  <button onclick="cargar()">↻</button>
</div>
<div class="alert" id="alertbar"></div>
<div class="wrap" id="main"><div class="spin"></div></div>
<script>
var URL_API = "https://script.google.com/macros/s/AKfycbwrp8Xipd_NEBnAvqxphejm6kWn4B4EHOGRjzLdGMvXgkhF_Ux9VkMb8-R9nxZi_HQTjg/exec?view=dashboard";
function esc(s){var d=document.createElement('div');d.textContent=String(s==null?'':s);return d.innerHTML}
function efc(p){return p>=50?'good':(p>=25?'warn':'bad')}
function cargar(){
  fetch(URL_API+'&t='+Date.now(),{cache:'no-store',redirect:'follow'}).then(function(r){return r.json()}).then(function(D){
    if(!D.ok) throw new Error(D.error||'error');
    document.getElementById('gen').textContent = 'actualizado ' + (D.generated_at||'').slice(11,16) + ' · refresca cada 5 min';
    var ab=document.getElementById('alertbar');
    if(D.alertas && D.alertas.length){ab.style.display='block';ab.innerHTML=D.alertas.map(function(a){return '• '+esc(a.msg||a)}).join('<br>')}else ab.style.display='none';
    var ef=D.eficiencia||{}, ay=D.ayer||{}, cs=D.cinco_s_hoy||{};
    var h='';
    h+='<div class="kpis">'
      +'<div class="kpi '+efc(D.eficiencia_hoy_pct)+'"><div class="k">EFICIENCIA HOY</div><div class="v">'+D.eficiencia_hoy_pct+'%</div><div class="s">ayer '+(ay.eficiencia_pct!=null?ay.eficiencia_pct:'—')+'% · mes '+D.eficiencia_mes_pct+'%</div></div>'
      +'<div class="kpi'+(D.hospital_count>D.hospital_target?' bad':' good')+'"><div class="k">HOSPITAL / QC</div><div class="v">'+D.hospital_count+'</div><div class="s">'+esc((D.hospital_personas||[]).slice(0,2).join(' · ')||'sin operarios')+'</div></div>'
      +'<div class="kpi"><div class="k">EN FABRICACIÓN</div><div class="v">'+D.en_fabricacion+'</div><div class="s">+ '+(D.en_cola||0)+' en cola · takt '+D.takt_dias+'d</div></div>'
      +'<div class="kpi warn"><div class="k">NC HOY</div><div class="v">'+D.nc_horas_hoy+'h</div><div class="s">'+(D.nc_personas||[]).length+' operarios</div></div>'
      +'</div>';
    h+='<div class="sec"><h3>5S HOY · '+(cs.sectores_ok||0)+'/'+(cs.sectores_total||12)+' OK · 🟢'+(cs.verdes||0)+' 🔵'+(cs.amarillos||0)+' 🔴'+(cs.rojos||0)+'</h3>'
      +((cs.pendientes||[]).length?'<div class="li">Pendientes: '+cs.pendientes.join(' · ')+'</div>':'<div class="li">Todos relevados ✓</div>')
      +'<div class="li"><b>Rondas</b><span>R '+(D.rondas_hoy_rodrigo||{}).validadas+'/'+(D.rondas_hoy_rodrigo||{}).total+' · Y '+(D.rondas_hoy_yance||{}).validadas+'/'+(D.rondas_hoy_yance||{}).total+'</span></div></div>';
    var dAyer=(ay.fecha||'').slice(8,10)+'/'+(ay.fecha||'').slice(5,7);
    var diaA=new Date((ay.fecha||'2026-01-01')+'T12:00:00');
    var jorA=diaA.getDay()===6?5:7.83;
    var dispA=ay.operarios?Math.round(jorA*ay.operarios*10)/10:0;
    var pctA=(dispA>0&&ay.nc_horas!=null)?Math.round(ay.nc_horas*1000/dispA)/10:null;
    h+='<div class="sec" style="border-left:4px solid var(--nar)"><h3>REUNIÓN 11AM · DATOS DE AYER '+dAyer+'</h3>'
      +'<div class="li"><b>Eficiencia cierre</b><span>'+(ay.eficiencia_pct!=null?ay.eficiencia_pct+'%':'—')+'</span></div>'
      +'<div class="li"><b>Hospital</b><span>'+(ay.hospital_count!=null?ay.hospital_count+' operarios':'—')+'</span></div>'
      +((ay.hospital_personas||[]).length?'<div class="li" style="font-size:12px;color:var(--muted)">'+esc(ay.hospital_personas.join(' · '))+'</div>':'')
      +'<div class="li"><b>NC horas</b><span>'+(ay.nc_horas!=null?ay.nc_horas+' h':'—')+(pctA!=null?' · '+pctA+'% del día ('+dispA+'h)':'')+'</span></div>'
      +((ay.nc_por_montaje||[]).length?'<div class="li" style="font-size:12px;color:var(--bad)">'+ay.nc_por_montaje.map(function(m){return esc(m.montaje)+' '+m.pct+'%'}).join(' · ')+'</div>':'')
      +'<div class="li"><b>Ausentes</b><span>'+(ay.ausentes_count!=null?ay.ausentes_count:'—')+'</span></div>'
      +'<div class="li"><b>Rondas</b><span>R '+((ay.rondas_rodrigo||{}).validadas||0)+'/'+((ay.rondas_rodrigo||{}).total||0)+' · Y '+((ay.rondas_yance||{}).validadas||0)+'/'+((ay.rondas_yance||{}).total||0)+'</span></div>'
      +'</div>';
    (D.montajes||[]).forEach(function(m){
      if(!m.mos.length && !m.cola) return;
      h+='<div class="monhead"><span class="pill" style="background:'+(m.color||'#666')+'">'+esc(m.code)+'</span><span class="monname">'+esc(m.name)+'</span><span class="moncnt">'+m.activas+' act · '+(m.cola||0)+' cola</span></div>';
      if(m.sigue) h+='<div class="sigue">sigue: '+esc((String(m.sigue.mo).match(/(\d{3,6})/)||[])[1]||m.sigue.mo)+(m.sigue.cliente?' · '+esc(m.sigue.cliente):'')+'</div>';
      m.mos.forEach(function(mo){
        var num=(String(mo.mo).match(/(\d{4,6})/)||[])[1]||mo.mo;
        h+='<div class="mo"><div class="l1"><span class="num">'+esc(num)+'</span><span class="meta">'+esc(mo.operario||'—')+(mo.producto?' · '+esc(mo.producto):'')+'</span><span class="st st-'+mo.estado.replace(/\s/g,'')+'">'+mo.estado+'</span></div>'
          +'<div class="l2">'+(mo.actividad_hoy===false?'sin actividad hoy':'avance día <b>'+mo.avance_dia_pct+'%</b>')+' · WOs '+mo.terminadas+'/'+mo.total
          +(mo.dias_en_produccion!=null?' · <span class="dias'+(mo.dias_en_produccion>5?' alert2':'')+'">📅 '+mo.dias_en_produccion+'d</span>':'')
          +(mo.cuello?'<br><span style="color:var(--bad)">cuello: '+esc(mo.cuello.wo)+' +'+mo.cuello.delta_min+'m ('+esc(mo.cuello.operario)+')</span>':'')
          +'</div></div>';
      });
    });
    var aus=(D.ausentes||[]);
    h+='<div class="sec"><h3>AUSENTES · '+aus.length+'</h3>'+(aus.length?aus.map(function(a){return '<div class="li"><b>'+esc(a.nombre)+'</b><span>'+esc(a.sector)+'</span></div>'}).join(''):'<div class="li">Sin ausentes ✓</div>')+'</div>';
    h+='<div class="sec"><h3>NO CONFORMIDAD · '+D.nc_horas_hoy+'h</h3>'
      +(D.nc_por_montaje||[]).map(function(m){return '<div class="li" style="background:rgba(220,38,38,.06)"><b style="color:var(--bad)">'+esc(m.montaje)+'</b><span><b>'+m.pct+'%</b> · '+m.horas+'h</span></div>'}).join('')
      +(D.nc_personas||[]).slice(0,8).map(function(p){return '<div class="li"><b>'+esc(p.operario)+'</b><span>'+p.horas+'h</span></div>'}).join('')+'</div>';
    document.getElementById('main').innerHTML=h;
  }).catch(function(e){
    document.getElementById('main').innerHTML='<div class="sec">No se pudo cargar: '+esc(String(e))+'</div>';
  });
}
cargar();
setInterval(cargar, 300000);
</script>
</body>
</html>
